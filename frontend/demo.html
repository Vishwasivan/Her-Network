<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babysitting Status Update</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 20px;
        }
        h2, h3 {
            margin-bottom: 10px;
        }
        .status-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .status-buttons button {
            width: 80px;
            height: 40px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        .red { background-color: red; }
        .yellow { background-color: yellow; color: black; }
        .green { background-color: green; }

        /* Popup Modal Styling */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            width: 400px;
            text-align: center;
        }
        .modal input, .modal textarea {
            width: 90%;
            margin: 10px 0;
        }
        .modal button {
            margin-top: 10px;
            padding: 10px 20px;
            cursor: pointer;
        }

        /* Historical Updates Log */
        .update-log {
            list-style-type: none;
            padding: 0;
        }
        .update-log li {
            background: #f9f9f9;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h2>Babysitting Status Update</h2>

    <!-- Status Update Buttons -->
    <div class="status-buttons" id="status-buttons"></div>

    <!-- Historical Updates Log -->
    <h3>Historical Updates Log</h3>
    <ul class="update-log" id="update-log"></ul>

    <!-- Popup Modal -->
    <div class="modal" id="statusModal">
        <div class="modal-content">
            <h3>Update Baby Status</h3>
            <select id="statusSelect">
                <option value="Feeding">Feeding</option>
                <option value="Sleeping">Sleeping</option>
                <option value="Playing">Playing</option>
            </select>
            <textarea id="notesInput" placeholder="Additional Notes..."></textarea>
            <input type="file" id="mediaInput" accept="image/*,video/*">
            <button onclick="submitStatus()">Submit</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        const totalButtons = 9;
        let currentButtonIndex = 0; // Track which button is enabled
        let activeButton = null; // Store the current button being updated

        // Initialize Buttons
        function initializeButtons() {
            const buttonContainer = document.getElementById('status-buttons');
            for (let i = 0; i < totalButtons; i++) {
                const button = document.createElement('button');
                button.textContent = `Hour ${i + 1}`;
                button.disabled = true; // Initially all buttons are disabled
                button.classList.add('red'); // Red means disabled
                button.onclick = () => openModal(button, i); // Open modal on click
                buttonContainer.appendChild(button);
            }
            enableButton(0); // Enable the first button
        }

        // Enable a Button
        function enableButton(index) {
            const button = document.getElementById('status-buttons').children[index];
            button.disabled = false;
            button.classList.remove('red');
            button.classList.add('yellow'); // Yellow means ready to update
        }

        // Open Modal Popup
        function openModal(button, index) {
            activeButton = button; // Track the active button
            currentButtonIndex = index; // Track the index for the next button
            document.getElementById('statusModal').style.display = 'flex';
        }

        // Close Modal Popup
        function closeModal() {
            document.getElementById('statusModal').style.display = 'none';
        }

        // Submit Status Update
        function submitStatus() {
            const status = document.getElementById('statusSelect').value;
            const notes = document.getElementById('notesInput').value;
            const media = document.getElementById('mediaInput').files[0];

            // Update the button text and color
            activeButton.textContent = 'Updated';
            activeButton.classList.remove('yellow');
            activeButton.classList.add('green'); // Green means updated
            activeButton.disabled = true;

            // Log the update
            logUpdate(currentButtonIndex + 1, status, notes, media);

            // Enable the next button after 1 hour (for testing, it's 5 seconds)
            if (currentButtonIndex + 1 < totalButtons) {
                setTimeout(() => enableButton(currentButtonIndex + 1), 5000); // 5000ms for testing, replace with 3600000ms for 1 hour
            }

            closeModal(); // Close the modal
        }

        // Log the Update in the Update Log
        function logUpdate(hour, status, notes, media) {
            const log = document.getElementById('update-log');
            const listItem = document.createElement('li');

            let mediaInfo = media ? `Uploaded: ${media.name}` : 'No media uploaded';
            listItem.textContent = `Hour ${hour} - Status: ${status}, Notes: ${notes}. ${mediaInfo} at ${new Date().toLocaleTimeString()}.`;
            
            log.appendChild(listItem);
        }

        // Initialize buttons when the page loads
        window.onload = initializeButtons;
    </script>

</body>
</html>
