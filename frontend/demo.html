<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Her Network - Service Offer</title>
    <link rel="icon" type="image/x-icon" href="static/Assets/logo.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;400;700&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <script src="https://kit.fontawesome.com/a7e1cdcb19.js" crossorigin="anonymous"></script>

    <style>
        /* Popup Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            width: 400px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
        }

        .close-button {
            cursor: pointer;
            background: none;
            border: none;
            font-size: 20px;
        }

        .modal input,
        .modal textarea,
        .modal select {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .modal button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .modal button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <div class="dash-main">
        <!-- Sidebar -->
        <div class="slid-bar">
            <div class="sild-logo">
                <img src="static/Assets/logo.png" alt="Logo">
                <h3>Her Network</h3>
            </div>
            <div class="slid-list">
                <a href="#" onclick="openServiceModal()"><i class="fa-solid fa-briefcase"></i> Offer a Service</a>
                <a href="javascript:void(0);" onclick="showChat()"><i class="fa-solid fa-message"></i>Messages</a>
                <a href="#"><i class="fa-regular fa-comment"></i>Feedback</a>
            </div>
        </div>

        <!-- Service Offer Modal -->

</body>
