<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Requests with Search</title>
    <style>
        /* Button styling */
        #openPopupBtn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Popup background */
        .popup {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        /* Popup content box */
        .popup-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            width: 50%;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        /* Close button */
        .close {
            float: right;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Search box */
        #searchInput {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        /* Request list */
        ul {
            list-style-type: none;
            padding: 0;
        }

        .request-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 8px;
            background-color: #f1f1f1;
            border-radius: 5px;
        }

        .request-item:hover {
            background-color: #e0e0e0;
        }

        /* Action buttons */
        .action-buttons button {
            margin-left: 5px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .accept-btn {
            background-color: #4CAF50;
            color: white;
        }

        .decline-btn {
            background-color: #f44336;
            color: white;
        }
    </style>
</head>
<body>

    <button id="openPopupBtn">Show Connection Requests</button>

    <div id="popup" class="popup">
        <div class="popup-content">
            <span id="closePopupBtn" class="close">&times;</span>
            <h2>Connection Requests</h2>
            <input type="text" id="searchInput" placeholder="Search requests...">
            <ul id="requestList">
                <li class="request-item">
                    <span>Alice wants to connect</span>
                    <div class="action-buttons">
                        <button class="accept-btn" onclick="handleAccept(this)">Accept</button>
                        <button class="decline-btn" onclick="handleDecline(this)">Decline</button>
                    </div>
                </li>
                <li class="request-item">
                    <span>Bob has sent you a request</span>
                    <div class="action-buttons">
                        <button class="accept-btn" onclick="handleAccept(this)">Accept</button>
                        <button class="decline-btn" onclick="handleDecline(this)">Decline</button>
                    </div>
                </li>
                <li class="request-item">
                    <span>Charlie wants to collaborate</span>
                    <div class="action-buttons">
                        <button class="accept-btn" onclick="handleAccept(this)">Accept</button>
                        <button class="decline-btn" onclick="handleDecline(this)">Decline</button>
                    </div>
                </li>
                <li class="request-item">
                    <span>Diana invited you to join her group</span>
                    <div class="action-buttons">
                        <button class="accept-btn" onclick="handleAccept(this)">Accept</button>
                        <button class="decline-btn" onclick="handleDecline(this)">Decline</button>
                    </div>
                </li>
            </ul>
        </div>
    </div>

    <script>
        const openPopupBtn = document.getElementById('openPopupBtn');
        const closePopupBtn = document.getElementById('closePopupBtn');
        const popup = document.getElementById('popup');
        const searchInput = document.getElementById('searchInput');
        const requestList = document.getElementById('requestList');
        const requests = requestList.getElementsByClassName('request-item');

        // Open the popup
        openPopupBtn.addEventListener('click', () => {
            popup.style.display = 'block';
        });

        // Close the popup
        closePopupBtn.addEventListener('click', () => {
            popup.style.display = 'none';
        });

        // Close the popup by clicking outside the content
        window.addEventListener('click', (event) => {
            if (event.target === popup) {
                popup.style.display = 'none';
            }
        });

        // Search filter
        searchInput.addEventListener('input', () => {
            const filter = searchInput.value.toLowerCase();
            for (let i = 0; i < requests.length; i++) {
                const text = requests[i].querySelector('span').textContent.toLowerCase();
                requests[i].style.display = text.includes(filter) ? '' : 'none';
            }
        });

        // Handle Accept button click
        function handleAccept(button) {
            const requestItem = button.closest('.request-item');
            alert(requestItem.querySelector('span').textContent + ' - Request Accepted');
            requestItem.remove();
        }

        // Handle Decline button click
        function handleDecline(button) {
            const requestItem = button.closest('.request-item');
            alert(requestItem.querySelector('span').textContent + ' - Request Declined');
            requestItem.remove();
        }
    </script>

</body>
</html>
